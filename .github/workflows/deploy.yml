name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build the Vue app
      - name: Build app
        run: npm run build
        env:
          GITHUB_PAGES: true

      # Merge landing site + app into one output
      - name: Prepare Pages output
        run: |
          mkdir -p pages-output
          cp site/index.html pages-output/index.html
          cp site/favicon.svg pages-output/favicon.svg
          cp -r dist pages-output/app

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
