name: Build & Release Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build Vue app
      - name: Install app deps
        run: npm ci

      - name: Build Vue app
        run: npm run build

      # Build Electron
      - name: Install Electron deps
        run: npm install
        working-directory: electron

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # List output
      - name: List release files
        run: ls -la release/ || ls -la electron/release/ || echo "No release dir found"
        shell: bash

      # Upload
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Rahul Goel AI Studio v${{ github.ref_name }}"
          body: |
            ## 🚀 Rahul Goel — AI Studio ${{ github.ref_name }}

            Your own private AI coding assistant. Runs 100% on your machine.

            ### What's included
            - 💬 Streaming chat with local AI models
            - 🤖 Model selector (kimi-k2.5, llama3, mistral, gemma, and more)
            - 🧠 Smart thinking animation — see the AI reason in real-time
            - ⌨️ Command palette (⌘K), slash commands, keyboard shortcuts
            - 📝 27 prompt templates for code review, testing, debugging
            - 🌙 Dark & light mode
            - 🧙 Built-in setup wizard — installs Ollama and models for you

            ### Download
            | Platform | File |
            |----------|------|
            | 🍎 macOS | `.dmg` below |
            | 🪟 Windows | `.exe` below |
            | 🐧 Linux | `.AppImage` below |

            ### First time?
            1. Download and open the app
            2. The setup wizard will guide you through installing Ollama
            3. It pulls the AI model automatically
            4. Start chatting — no account, no cloud, no cost

            > **Important:** Start Ollama with `OLLAMA_ORIGINS="*" ollama serve` for CORS support.

            ---
            Built by [Rahul Goel](https://github.com/goelrah) — Independent Consultant
          files: |
            release/**/*.dmg
            release/**/*.exe
            release/**/*.msi
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.zip
            electron/release/**/*.dmg
            electron/release/**/*.exe
            electron/release/**/*.msi
            electron/release/**/*.AppImage
            electron/release/**/*.deb
            electron/release/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
