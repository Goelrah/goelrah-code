name: Build & Release Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-desktop:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Electron deps
        run: npm install
        working-directory: electron

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: ls -R electron/release/ || true
        shell: bash

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Rahul Goel AI Studio ${{ github.ref_name }}"
          body: |
            ## 🚀 Rahul Goel — AI Studio ${{ github.ref_name }}

            Your own private AI coding assistant. 100% local. Free forever.

            ### Download
            Pick your platform from the assets below.

            ### First time?
            1. Download and open the app
            2. Setup wizard installs Ollama + AI model
            3. Start chatting — no account needed

            > Start Ollama with `OLLAMA_ORIGINS="*" ollama serve`

            Built by [Rahul Goel](https://github.com/goelrah)
          files: |
            electron/release/*.dmg
            electron/release/*.exe
            electron/release/*.AppImage
            electron/release/*.zip
            electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
