name: Build & Release Desktop App

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Build Vue app
      - run: npm ci
      - run: npm run build

      # Build Electron
      - name: Install Electron deps
        run: npm install
        working-directory: electron

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }}
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: ls -la electron/release/ || true
        shell: bash

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "Rahul Goel AI Studio ${{ github.ref_name }}"
          body: |
            ## 🚀 Rahul Goel — AI Studio ${{ github.ref_name }}

            Your own private AI coding assistant. Runs 100% on your machine.

            ### What's included
            - 💬 Streaming chat with local AI models
            - 🤖 Model selector (kimi-k2.5, llama3, mistral, gemma)
            - 🧠 Smart thinking animation — see the AI reason in real-time
            - ⌨️ Command palette, slash commands, keyboard shortcuts
            - 📝 27 prompt templates
            - 🌙 Dark & light mode
            - 🧙 Built-in setup wizard

            ### First time?
            1. Download for your platform below
            2. Open the app — setup wizard guides you
            3. Start chatting — no account, no cloud, no cost

            > Start Ollama with `OLLAMA_ORIGINS="*" ollama serve`

            Built by [Rahul Goel](https://github.com/goelrah)
          files: |
            electron/release/*.dmg
            electron/release/*.exe
            electron/release/*.msi
            electron/release/*.AppImage
            electron/release/*.deb
            electron/release/*.zip
            electron/release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
